# ======================================================================
# CORE ESPHOME CONFIGURATION
# ======================================================================
esphome:
  name: d-control-400
  includes:
    - cc1101.h
    - ../include/pinout.h
    - ../include/signal.h
  libraries:
    - SPI
    - jgromes/RadioLib@^6.0.0
  on_boot:
    # Priority 600 runs early in the boot sequence, before Wi-Fi connects
    priority: 600
    then:
      # 1. Immediately turn the LED Solid Red to indicate boot-up
      - light.turn_on:
          id: status_led
          brightness: 50%
          red: 1.0
          green: 0.0
          blue: 0.0
      # 2. Run the custom C++ CC1101 initialization routine
      - lambda: |-
          if (!cc1101_ctrl::setup()) {
            ESP_LOGE("cc1101", "CC1101 initialization failed!");
          }

esp32:
  board: lolin_c3_mini
  framework:
    type: arduino

# Enable standard Home Assistant API and over-the-air updates
api:
logger:
ota:
  - platform: esphome

# ======================================================================
# NETWORK CONFIGURATION
# ======================================================================
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # CRITICAL HARDWARE FIX: Clamp the Wi-Fi transmit power to prevent
  # a voltage brownout on the ESP32-C3's tiny voltage regulator.
  output_power: 8.5dBm

  on_connect:
    - if:
        # Check the C++ flag to see if the CC1101 initialized properly
        condition:
            lambda: 'return cc1101_ctrl::is_ready();'
        then:
          # SUCCESS: Both Wi-Fi and Radio are good! Flash Green, then turn off.
          - light.turn_on:
              id: status_led
              brightness: 50%
              red: 0.0
              green: 1.0
              blue: 0.0
          - delay: 500ms
          - light.turn_off: status_led
        else:
          # HARDWARE FAILURE: Radio failed to init. Lock the LED to Solid Red.
          - light.turn_on:
              id: status_led
              brightness: 50%
              red: 1.0
              green: 0.0
              blue: 0.0

# ======================================================================
# HARDWARE COMPONENTS
# ======================================================================

# Onboard WS2812B RGB LED (NeoPixel)
light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    rgb_order: GRB
    pin: 7
    num_leds: 1
    name: "Status LED"
    id: status_led
    # Disable ESPHome's default 1-second fade animation for instant response
    default_transition_length: 0s
    internal: true

# Script to transmit the beep sequence
script:
  - id: transmit_beep
    mode: single
    then:
      - if:
          # SAFETY CHECK: Only allow transmission if the radio is physically responding
          condition:
            lambda: 'return cc1101_ctrl::is_ready();'
          then:
            # 1. Turn LED Blue to indicate transmission
            - light.turn_on:
                id: status_led
                brightness: 80%
                red: 0.0
                green: 0.0
                blue: 1.0
            # 2. Yield 500ms so ESPHome can physically push the Blue color to the LED
            - delay: 500ms
            # 3. Hijack the CPU and bit-bang the SDR timings to the radio
            - lambda: |-
                if (!cc1101_ctrl::transmit_beep_signal()) {
                  ESP_LOGE("cc1101", "Beep signal transmission failed!");
                }
            # 4. Turn LED off when finished
            - light.turn_off: status_led
          else:
            - logger.log:
                level: ERROR
                format: "Cannot transmit: CC1101 Radio is not initialized!"
      # 5. NEW: Reset the switch back to OFF in Home Assistant only after everything is done
      - switch.template.publish:
          id: beep_switch
          state: OFF

# Home Assistant Dashboard Switch (momentary)
switch:
  - platform: template
    name: "Trigger Collar Beep"
    icon: "mdi:volume-high"
    id: beep_switch
    restore_mode: ALWAYS_OFF
    optimistic: false
    turn_on_action:
      - switch.template.publish:
          id: beep_switch
          state: ON
      - script.execute: transmit_beep

# Physical BOOT button on the Lolin C3 Mini
binary_sensor:
  - platform: gpio
    pin:
      number: 9 # GPIO 9 is the standard strapping/boot pin
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Physical Boot Button"
    internal: true
    on_press:
      # Map the physical button press directly to the Home Assistant software button
      - switch.turn_on: beep_switch

